<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cálculo de Comprimidos Recebidos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/comprimidos.css">
</head>
<body>
  <main class="container">

<h1>Cálculo de Comprimidos Recebidos</h1>


<div class="container">

  <label>Quantidade das Barricas</label>

  <input type="number" class="barrica" placeholder="Barrica 1">
  <input type="number" class="barrica" placeholder="Barrica 2">
  <input type="number" class="barrica" placeholder="Barrica 3">
  <input type="number" class="barrica" placeholder="Barrica 4">
  <input type="number" class="barrica" placeholder="Barrica 5">
  <input type="number" class="barrica" placeholder="Barrica 6">
  <input type="number" class="barrica" placeholder="Barrica 7">
  <input type="number" class="barrica" placeholder="Barrica 8">

  <label for="peso">Peso médio do comprimido</label>
  <input type="number" id="peso" step="0.0001" placeholder="Ex: 0.250">

  <button onclick="calcular()">Calcular</button>
  <button class="btn-voltar"><a href="index.html">← Início</a></button>

  <div class="resultado" id="resultado"></div>

</div>

<script src="calculo_comprimido.js">
  



  
</script>

</body>
</html>
