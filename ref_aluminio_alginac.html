<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Fechamento - Blister</title>
    <link rel="stylesheet" href="css/ref_aluminio.css">
</head>
<body>
<div class="container">
    <h1>Cálculo de Refugo Alumínio/Alu-alu</h1>

    <div class="input-group-main">
        <label for="qtdBlisters">TOTAL DE BLISTERS PRODUZIDOS</label>
        <input type="number" id="qtdBlisters" placeholder="Ex: 1000" oninput="executarCalculos()">
    </div>

    <form id="calcForm">
        <div class="grid-inputs">
            <div class="card">
                <h3 class="section-title">Alumínio</h3>
                <div class="input-field">
                    <label>Recebido (kg)</label>
                    <input type="number" id="recAlu" step="0.0001" placeholder="0.000" oninput="executarCalculos()">
                </div>
                <div class="input-field" style="margin-top: 10px;">
                    <label>Utilizado Padrão (Fixo)</label>
                    <input type="text" id="utilAluPadrao" readonly value="0.000">
                </div>
                <div class="input-field" style="margin-top: 10px;">
                    <label>Devolvido (kg)</label>
                    <input type="number" id="devAlu" step="0.0001" placeholder="0.000" oninput="executarCalculos()">
                </div>
            </div>

            <div class="card">
                <h3 class="section-title">Alu-alu</h3>
                <div class="input-field">
                    <label>Recebido (kg)</label>
                    <input type="number" id="recAluAlu" step="0.0001" placeholder="0.000" oninput="executarCalculos()">
                </div>
                <div class="input-field" style="margin-top: 10px;">
                    <label>Utilizado Padrão (Fixo)</label>
                    <input type="text" id="utilAluAluPadrao" readonly value="0.000">
                </div>
                <div class="input-field" style="margin-top: 10px;">
                    <label>Devolvido (kg)</label>
                    <input type="number" id="devAluAlu" step="0.0001" placeholder="0.000" oninput="executarCalculos()">
                </div>
            </div>
        </div>
    </form>

    <div class="button-group">
        <button type="button" class="btn btn-clear" onclick="limparFormulario()">🧹 Limpar Formulário</button>
        <a href="recon_alginac.html" class="btn btn-back">⬅️ Voltar</a>
    </div>

    <div id="panelResultados" class="result-panel" style="display:none;">
        <h3 style="margin-top:0; color: var(--primary-dark); text-align: center;">Resultados do Ajuste Proporcional</h3>
        <div class="result-grid">
            <div class="summary-total" id="somaRefugosIniciais"></div>
            
            <div class="result-box">
                <strong>Alumínio Ajustado</strong>
                <p>Novo Refugo: <span class="highlight" id="resRefAlu">0.000</span></p>
                <p>Novo Utilizado: <span class="highlight" id="resUtilAlu">0.000</span></p>
            </div>

            <div class="result-box">
                <strong>Alu-alu Ajustado</strong>
                <p>Novo Refugo: <span class="highlight" id="resRefAluAlu">0.000</span></p>
                <p>Novo Utilizado: <span class="highlight" id="resUtilAluAlu">0.000</span></p>
            </div>
        </div>
    </div>
</div>

<script src="js/ref_aluminio_alginac.js"></script>
</body>
</html>
